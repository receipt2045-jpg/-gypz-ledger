name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # 저장소 이름이 바뀌어도 base 경로가 자동으로 따라감
          VITE_BASE: ./
          # anon key는 공개되어도 안전한 클라이언트용 키 (데이터 접근은 RLS가 통제)
          VITE_SUPABASE_URL: https://sygmpteafxlrhfbipkep.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_gGbVf_OUf8fmPRGoVdCYMw_UgHFbK16
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
